<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Random Số 1-99</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RANDOM NUMBER">
    <link rel="apple-touch-icon" href="https://drive.google.com/file/d/1o4dCk1SzEBYvZM-7tl0yfWalN-MLty_z/view?usp=drive_link">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #e3f2fd;
            margin: 0;
            transition: background-color 0.5s;
        }
        #number {
            font-size: 15rem;
            font-weight: bold;
            color: #1565c0;
            margin-bottom: 40px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            transition: opacity 0.2s;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #ff9800;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #e68a00;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .controls label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .controls input {
            width: 80px;
            padding: 8px;
            font-size: 1.2rem;
            border: 2px solid #ccc;
            border-radius: 6px;
            text-align: center;
            transition: border-color 0.3s;
        }
        .controls input:focus {
            border-color: #1565c0;
            outline: none;
        }
    </style>
</head>
<body>

    <div id="number">?</div>
    
    <div class="controls">
        <label>Từ: <input type="number" id="minInput" value="1"></label>
        <label>Đến: <input type="number" id="maxInput" value="99"></label>
        <label>Thời gian (giây): <input type="number" id="timeInput" value="3" min="0.5" step="0.5"></label>
    </div>

    <button id="toggleBtn" onclick="toggleRandom()">Bắt Đầu</button>

    <script>
        let intervalId = null;
        let isRunning = false;

        function generateRandom() {
            // Lấy giá trị từ ô nhập liệu
            let min = parseInt(document.getElementById('minInput').value);
            let max = parseInt(document.getElementById('maxInput').value);

            // Kiểm tra nếu người dùng bỏ trống hoặc nhập không phải số
            if (isNaN(min)) min = 1;
            if (isNaN(max)) max = 99;
            
            // Tự động đảo ngược nếu 'Từ' lớn hơn 'Đến'
            if (min > max) {
                let temp = min;
                min = max;
                max = temp;
                // Sửa lại hiển thị trên màn hình cho đúng
                document.getElementById('minInput').value = min;
                document.getElementById('maxInput').value = max;
            }

            // Tạo số ngẫu nhiên trong khoảng đã chọn
            const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
            
            // Hiệu ứng chớp nhẹ khi đổi số
            const numElement = document.getElementById('number');
            numElement.style.opacity = 0;
            
            setTimeout(() => {
                numElement.innerText = randomNum;
                numElement.style.opacity = 1;
            }, 200); // Đợi 0.2s rồi mới hiện số mới cho đẹp mắt
        }

        function toggleRandom() {
            const btn = document.getElementById('toggleBtn');
            
            if (isRunning) {
                // Tạm dừng
                clearInterval(intervalId);
                btn.innerText = "Tiếp Tục";
                btn.style.backgroundColor = "#4caf50"; // Đổi màu nút
                isRunning = false;
            } else {
                // Lấy thời gian chuyển đổi từ ô nhập (mặc định 3s nếu nhập sai)
                let timeInSeconds = parseFloat(document.getElementById('timeInput').value);
                if (isNaN(timeInSeconds) || timeInSeconds <= 0) timeInSeconds = 3;

                // Bắt đầu chạy
                generateRandom(); // Hiện số đầu tiên ngay lập tức
                intervalId = setInterval(generateRandom, timeInSeconds * 1000); 
                btn.innerText = "Tạm Dừng";
                btn.style.backgroundColor = "#ff9800"; // Trả lại màu cam
                isRunning = true;
            }
        }
    </script>

</body>
</html>
